<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dholera - Project Documentation PDFs</title>
  <style>
    :root {
      --primary: #1b4a6e;
      --primary-light: #4a90e2;
      --surface: #ffffff;
      --bg: #f3f5fa;
      --text: #1f2937;
      --muted: #64748b;
      --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
      --accent: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(74, 144, 226, 0.08), transparent 30%),
        radial-gradient(circle at 85% 16%, rgba(2, 6, 23, 0.08), transparent 30%),
        var(--bg);
    }

    .wrap {
      width: min(1260px, 100% - 30px);
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(27, 74, 110, 0.12);
      padding: 32px;
      margin-bottom: 32px;
      text-align: center;
    }

    .header h1 {
      margin: 0 0 8px 0;
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header p {
      margin: 0;
      opacity: 0.95;
      font-size: 1.05rem;
    }

    .filter-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      padding: 10px 20px;
      border: 2px solid rgba(27, 74, 110, 0.2);
      background: var(--surface);
      color: var(--primary);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s var(--ease-smooth);
      font-size: 0.95rem;
    }

    .filter-btn:hover {
      border-color: var(--primary);
      background: rgba(74, 144, 226, 0.1);
    }

    .filter-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
      transition: all 0.3s var(--ease-smooth);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
      transform: translateY(-4px);
      border-color: var(--primary-light);
    }

    .card-thumb {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #f3f5fa 0%, #e2e8f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      font-size: 3rem;
      color: var(--muted);
    }

    .card-thumb canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-content {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      margin: 0;
      line-height: 1.4;
      word-break: break-word;
    }

    .card-meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 8px;
      margin-bottom: auto;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
    }

    .card-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-view {
      background: var(--primary);
      color: #fff;
    }

    .btn-view:hover {
      background: var(--primary-light);
    }

    .btn-download {
      background: rgba(74, 144, 226, 0.1);
      color: var(--primary);
    }

    .btn-download:hover {
      background: rgba(74, 144, 226, 0.2);
    }

    .no-results {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    .no-results h3 {
      margin: 0 0 8px 0;
      font-size: 1.3rem;
    }

    .stats {
      text-align: center;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .header {
        padding: 24px;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px;
      }

      .card-thumb {
        height: 140px;
        font-size: 2rem;
      }

      .filter-buttons {
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 8px;
      }
    }

    .pdf-icon {
      width: 48px;
      height: 48px;
      background: rgba(27, 74, 110, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 24px;
      transition: all 0.2s;
    }

    .back-link:hover {
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="back-link">← Back to Home</a>

    <div class="header">
      <h1>Project Documentation</h1>
      <p>Comprehensive collection of technical drawings, maps, and planning documents</p>
    </div>

    <div class="filter-buttons">
      <button class="filter-btn active" onclick="filterByCategory('all')">All PDFs</button>
      <button class="filter-btn" onclick="filterByCategory('naksha')">Naksha 28</button>
      <button class="filter-btn" onclick="filterByCategory('dp')">DP Maps</button>
      <button class="filter-btn" onclick="filterByCategory('tp')">TP Plans</button>
    </div>

    <div class="stats">
      Showing <span id="count">0</span> document(s)
    </div>

    <div id="grid" class="grid"></div>

    <div id="no-results" class="no-results" style="display: none;">
      <h3>No documents found</h3>
      <p>Try selecting a different category.</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // Register the workerSrc
    pdfjsLib.GlobalWorkerOptions.workerSrc = 
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // All PDF files in the pdf folder
    const allFiles = [
      // Naksha files
      { title: "28 Naksha Examples", file: "28        TP3A Authority Paramarsh before Avord sudhara (authority paramars-Layout1.pdf", category: "naksha" },
      { title: "DHOLERA TP 1A2 FINAL", file: "2___DHOLERA TP 1A2 FINAL.pdf", category: "naksha" },
      
      // DP Maps
      { title: "DHOLERA New DP Plan - MAP", file: "DHOLERA New DP Plan-MAP.pdf", category: "dp" },
      { title: "New DP Plan", file: "New_DP.pdf", category: "dp" },
      { title: "DP Zone - Hath and Resurvey", file: "d.p zone hath and resurwey number ok-Model.pdf", category: "dp" },
      
      // TP Plans
      { title: "TP 3C-1 CTP TR Paramarsh", file: "10        TP 3C-1 CTP TR  Paramarsh-Layout1.pdf", category: "tp" },
      { title: "TP 4B 2021", file: "10_TP-4B_2.pdf", category: "tp" },
      { title: "5B 2021", file: "10_______5B_2021.pdf", category: "tp" },
      { title: "6A 2021", file: "11________6A_2021.pdf", category: "tp" },
      { title: "TP 4B-1 After TR Final", file: "12       TP 4B-1_Aftfter TR final-portrai.pdf", category: "tp" },
      { title: "TP5A After TR Final - Model", file: "14       TP5A ater TR final-Model.pdf", category: "tp" },
      { title: "3B 2021", file: "7_______3B_2021.pdf", category: "tp" },
      { title: "5A 2021", file: "9_______5A_2021.pdf", category: "tp" },
      { title: "T.P. - 5 O.P. - F.P.", file: "T.P. - 5 O.P. - F.P.  (1).pdf", category: "tp" },
      { title: "TP 1A1", file: "TP 1A1_.pdf", category: "tp" },
      { title: "TP 4B1 2024", file: "TP 4B1 2024.pdf", category: "tp" },
      { title: "TP 2B1", file: "TP.2B1 (1).pdf", category: "tp" },
      
      // Other documents
      { title: "2B-1", file: "3____2b-1.pdf", category: "other" },
      { title: "2B-2", file: "4____2B-2.pdf", category: "other" },
      { title: "2B3", file: "5____2B3.pdf", category: "other" },
      { title: "Latest Update", file: "14-04-2026   150238.pdf", category: "other" },
    ];

    let currentCategory = 'all';
    let currentFiles = allFiles;
    const grid = document.getElementById("grid");
    const countSpan = document.getElementById("count");
    const noResults = document.getElementById("no-results");

    // Extract thumbnail from PDF
    async function extractThumbnail(pdfPath) {
      try {
        const pdf = await pdfjsLib.getDocument(pdfPath).promise;
        const page = await pdf.getPage(1);
        const scale = 1.5;
        const viewport = page.getViewport({ scale });
        
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        
        const context = canvas.getContext('2d');
        await page.render({ canvasContext: context, viewport }).promise;
        
        return canvas;
      } catch (error) {
        console.error('Error extracting thumbnail:', error);
        return null;
      }
    }

    // Render grid
    async function renderGrid() {
      grid.innerHTML = '';
      
      const filteredFiles = currentCategory === 'all' 
        ? allFiles 
        : allFiles.filter(f => f.category === currentCategory);

      countSpan.textContent = filteredFiles.length;

      if (filteredFiles.length === 0) {
        grid.style.display = 'none';
        noResults.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      noResults.style.display = 'none';

      for (const fileData of filteredFiles) {
        const card = document.createElement('div');
        card.className = 'card';
        
        const thumb = document.createElement('div');
        thumb.className = 'card-thumb';
        
        // Try to extract PDF thumbnail
        try {
          const canvas = await extractThumbnail(`/pdf/${encodeURIComponent(fileData.file)}`);
          if (canvas) {
            canvas.style.maxWidth = '100%';
            canvas.style.maxHeight = '100%';
            thumb.appendChild(canvas);
          } else {
            thumb.innerHTML = '<div class="pdf-icon">📄</div>';
          }
        } catch (error) {
          thumb.innerHTML = '<div class="pdf-icon">📄</div>';
        }

        const content = document.createElement('div');
        content.className = 'card-content';
        
        const title = document.createElement('h3');
        title.className = 'card-title';
        title.textContent = fileData.title;
        
        const meta = document.createElement('div');
        meta.className = 'card-meta';
        meta.textContent = fileData.category.toUpperCase();
        
        const actions = document.createElement('div');
        actions.className = 'card-actions';
        
        const viewBtn = document.createElement('button');
        viewBtn.className = 'card-btn btn-view';
        viewBtn.textContent = 'View';
        viewBtn.onclick = () => {
          window.open(`/pdf/${encodeURIComponent(fileData.file)}`, '_blank');
        };
        
        const downloadBtn = document.createElement('button');
        downloadBtn.className = 'card-btn btn-download';
        downloadBtn.textContent = 'Download';
        downloadBtn.onclick = (e) => {
          e.stopPropagation();
          const link = document.createElement('a');
          link.href = `/pdf/${encodeURIComponent(fileData.file)}`;
          link.download = fileData.file;
          link.click();
        };
        
        actions.appendChild(viewBtn);
        actions.appendChild(downloadBtn);
        
        content.appendChild(title);
        content.appendChild(meta);
        content.appendChild(actions);
        
        card.appendChild(thumb);
        card.appendChild(content);
        grid.appendChild(card);
      }
    }

    // Filter function
    function filterByCategory(category) {
      currentCategory = category;
      
      // Update button states
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      renderGrid();
    }

    // Initial render
    renderGrid();
  </script>
</body>
</html>
