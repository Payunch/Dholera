<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salamati Publication - PDF Library</title>
  <style>
    :root {
      --fire: #e25822;
      --surface: #ffffff;
      --bg: #f3f5fa;
      --text: #1f2937;
      --muted: #64748b;
      --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(226, 88, 34, 0.12), transparent 30%),
        radial-gradient(circle at 85% 16%, rgba(2, 6, 23, 0.08), transparent 30%),
        var(--bg);
    }

    .wrap {
      width: min(1260px, 100% - 30px);
      margin: 0 auto;
      padding: 16px 0 36px;
    }

    .hero {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      padding: 16px 14px;
      margin-bottom: 18px;
    }

    .brand-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      text-align: left;
      flex-wrap: nowrap;
    }

    .brand-logo {
      width: clamp(110px, 15vw, 180px);
      height: auto;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-text { line-height: 1.1; min-width: 0; }

    .brand-name {
      margin: 0;
      font-size: clamp(1.35rem, 3.8vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }

    .brand-name .green { color: #047857; }
    .brand-name .red { color: #dc2626; }

    .brand-company {
      margin: 6px 0 0;
      font-size: clamp(1rem, 2.4vw, 1.9rem);
      font-weight: 800;
      color: #1f2937;
      white-space: nowrap;
    }

    .brand-reg {
      margin: 8px 0 0;
      font-size: clamp(0.9rem, 2.05vw, 1.65rem);
      font-weight: 800;
      color: #3730a3;
      white-space: nowrap;
    }

    /* Responsive layout: 1 col mobile, 2 col standard, 4 col ultra-wide */
    .grid {
      display: grid;
      grid-template-columns: minmax(220px, 88vw);
      justify-content: center;
      column-gap: 54px; /* 40px */
      row-gap: 54px; /* 42px */
      margin-top: 32px;
      perspective: 1200px;
      transform-style: preserve-3d;
      align-items: start;
    }

    .grid.hovering .card {
      opacity: 0.56;
      filter: saturate(0.82);
      transform: scale(0.95);
    }

    .card {
      --mx: 50%;
      --my: 50%;
      position: relative;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      transition:
        transform 380ms var(--ease-smooth),
        box-shadow 320ms var(--ease-smooth),
        border-color 320ms var(--ease-smooth),
        opacity 280ms var(--ease-smooth),
        filter 320ms var(--ease-smooth);
      will-change: transform;
      transform-style: preserve-3d;
      animation: cardIn 0.5s ease both;
  z-index: 1;
  backface-visibility: hidden;
  -webkit-font-smoothing: subpixel-antialiased;
    }


    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(320px circle at var(--mx) var(--my), rgba(226, 88, 34, 0.2), transparent 45%);
      opacity: 0;
      transition: opacity 300ms var(--ease-smooth);
      pointer-events: none;
      z-index: 1;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.015);
      border-color: rgba(226, 88, 34, 0.34);
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.16);
    }

    .card.is-focus {
      border-color: rgba(226, 88, 34, 0.55);
      box-shadow: 0 24px 42px rgba(15, 23, 42, 0.24);
      transform: translateY(-10px) scale(1.08) !important;
      opacity: 1 !important;
      filter: none !important;
      z-index: 50; /* Ensure it stays on top of everything */
      /* transform: translateY(-12px) scale(1.05) !important; */
    }

    .card:hover::before { opacity: 1; }

    .preview-wrap {
      position: relative;
      aspect-ratio: 3 / 4;
      width: 100%;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      z-index: 2;
      display: grid;
      place-items: center;
    }

    .preview-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      pointer-events: auto;
      transform: none;
    }

    /* Desktop: keep card cursor effect smooth over preview area */
    body:not(.touch-mode) .preview-frame {
      pointer-events: none;
    }

    /* In mobile-thumb-mode, default to image thumbnail */
    body.mobile-thumb-mode .preview-frame {
      display: none;
      pointer-events: none;
    }


    .preview-canvas {
      display: none;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      background: #fff;
      z-index: 2;
    }

    .preview-status {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
      background: #f8fafc;
      z-index: 4;
    }

    .preview-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.92);
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
      z-index: 5;
      pointer-events: none;
    }

    .preview-loader.hidden {
      display: none;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e2e8f0;
      border-top-color: var(--fire);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    body.mobile-thumb-mode .preview-canvas {
      display: block;
    }


    /* Hard fallback: always use thumbnail mode on small screens */
    @media (max-width: 900px) {
      .preview-frame {
        display: none;
        pointer-events: none;
      }
      .preview-canvas {
        display: block;
      }
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 24px;
      background: #d64444;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      z-index: 3;
      pointer-events: none;
    }

    .meta {
      position: relative;
      z-index: 2;
      padding: 12px 14px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: #1f2937;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #6d4d99;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 8px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: transform 240ms var(--ease-smooth), background 240ms var(--ease-smooth);
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 50%;
      height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.35), transparent);
      transition: left 420ms var(--ease-smooth);
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #5f4386;
    }

    .btn:hover::after {
      left: 130%;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (min-width: 700px) {
      .grid {
        grid-template-columns: repeat(2, minmax(240px, 360px));
        justify-content: center;
        column-gap: 54px;
        row-gap: 54px;
      }
    }

    @media (max-width: 860px) {
      .brand-top {
        flex-wrap: wrap;
        text-align: center;
        gap: 10px;
      }
      .brand-name, .brand-company, .brand-reg { white-space: normal; }
    }

    @media (min-width: 1700px) {
      .grid {
        grid-template-columns: repeat(4, minmax(240px, 360px));
        justify-content: center;
        column-gap: 54px;/* 48px; */
        row-gap: 54px; /* 56px; */
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- <section class="hero">
      <div class="brand-top">
        <img class="brand-logo" src="icon.png" alt="Salamati Publication Logo" />
        <div class="brand-text">
          <h2 class="brand-name">
            <span class="green">SALAMATI</span> <span class="red">PUBLICATION</span>
          </h2>
          <p class="brand-company">(OPC) PRIVATE LIMITED</p>
          <p class="brand-reg">PRGI Reg. No: GJMUL/25/A5219</p>
        </div>
      </div>
    </section> -->

    <div id="grid" class="grid"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const files = [
      { title: "NIYATI CATALOGUE", file: "NIYATI CATALOGUE.pdf" },
      { title: "NIYA FIRE CATALOGUE", file: "NIYA FIRE CATALOGUE.pdf" },
      { title: "KNOW THE FIRE - HINDI", file: "KNOW THE FIRE - HINDI.pdf" },
      { title: "KNOW THE FIRE - GUJARATI", file: "KNOW THE FIRE - GUJARATI.pdf" }
    ];

    const grid = document.getElementById("grid");
    let focusedCard = null;
    let lockedCard = null;
    let mobileThumbsReady = false;

    // Robust interaction-mode detection:
    // hover-capable = desktop/laptop pointer, touch-mode = mobile/coarse pointer
    const hoverFineMedia = window.matchMedia("(hover: hover) and (pointer: fine)");

    function isTouchMode() {
      return !hoverFineMedia.matches;
    }

    function useMobileThumbMode() {
      return isTouchMode() || window.innerWidth <= 900;
    }

    function applyInteractionMode() {
      document.body.classList.toggle("touch-mode", isTouchMode());
      document.body.classList.toggle("mobile-thumb-mode", useMobileThumbMode());
      // Clear stale focus on mode change
      lockedCard = null;
      setFocusedCard(null);
    }

    function getFileUrl(fileName) {
      return encodeURIComponent(fileName).replace(/%2F/g, "/");
    }

    function getPdfUrl(fileName) {
      return getFileUrl(fileName) + "#toolbar=1&navpanes=0&view=FitH";
    }

    async function renderFirstPage(canvas, fileName) {
      if (!window.pdfjsLib) return false;

      const pdfUrl = encodeURIComponent(fileName).replace(/%2F/g, "/");
      const loadingTask = window.pdfjsLib.getDocument(pdfUrl);
      const pdf = await loadingTask.promise;
      const page = await pdf.getPage(1);

      const parent = canvas.parentElement;
      const viewport = page.getViewport({ scale: 1 });
      const fitScale = Math.min(
        (parent.clientWidth - 10) / viewport.width,
        (parent.clientHeight - 10) / viewport.height
      );
      const renderViewport = page.getViewport({ scale: fitScale });
      const ratio = window.devicePixelRatio || 1;

      canvas.width = Math.floor(renderViewport.width * ratio);
      canvas.height = Math.floor(renderViewport.height * ratio);
      canvas.style.width = `${Math.floor(renderViewport.width)}px`;
      canvas.style.height = `${Math.floor(renderViewport.height)}px`;

      const ctx = canvas.getContext("2d", { alpha: false });
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      await page.render({ canvasContext: ctx, viewport: renderViewport }).promise;
      return true;
    }

    function setFocusedCard(card) {
      if (focusedCard && focusedCard !== card) {
        focusedCard.classList.remove("is-focus");
      }

      focusedCard = card || null;

      if (focusedCard) {
        grid.classList.add("hovering");
        focusedCard.classList.add("is-focus");
      } else {
        grid.classList.remove("hovering");
      }
    }

    applyInteractionMode();
    if (typeof hoverFineMedia.addEventListener === "function") {
      hoverFineMedia.addEventListener("change", applyInteractionMode);
    } else if (typeof hoverFineMedia.addListener === "function") {
      hoverFineMedia.addListener(applyInteractionMode);
    }

    files.forEach((item, index) => {
      const card = document.createElement("article");
      card.className = "card";
      card.style.animationDelay = `${index * 90}ms`;
      card.innerHTML = `
        <div class="preview-wrap">
          <span class="badge">PDF</span>
          <div class="preview-loader">
            <span class="spinner"></span>
            <span>Loading preview...</span>
          </div>
          <iframe class="preview-frame" src="${getPdfUrl(item.file)}" title="${item.title}"></iframe>
          <canvas class="preview-canvas" aria-label="${item.title} preview"></canvas>
          <div class="preview-status">Preview unavailable. Use Open PDF.</div>
        </div>
        <div class="meta">
          <h2 class="title" title="${item.title}">${item.title}</h2>
          <a class="btn" href="${getFileUrl(item.file)}" target="_blank" rel="noopener noreferrer">Open PDF</a>
        </div>
      `;

      // 1. Mouse Move (Glow Effect)
      card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        card.style.setProperty("--mx", `${e.clientX - rect.left}px`);
        card.style.setProperty("--my", `${e.clientY - rect.top}px`);
      });

      const frame = card.querySelector(".preview-frame");
      const loader = card.querySelector(".preview-loader");
      const status = card.querySelector(".preview-status");

      if (frame) {
        frame.addEventListener("load", () => {
          if (!isTouchMode()) loader?.classList.add("hidden");
        });
        frame.addEventListener("error", () => {
          if (!isTouchMode()) {
            loader?.classList.add("hidden");
            if (status) status.style.display = "flex";
          }
        });
      }

      // 2. Desktop Hover
      card.addEventListener("mouseenter", () => {
        if (!isTouchMode()) setFocusedCard(card);
      });

      // 3. Click / Touch logic
      card.addEventListener("click", (e) => {
        // If user clicks the button, don't toggle focus
        if (e.target.closest(".btn")) return;

        if (isTouchMode()) {
          // Tap: lock focus on this card only (no in-preview open on mobile)
          if (focusedCard !== card) {
            lockedCard = card;
            setFocusedCard(card);
          }
        } else {
          // Desktop click keeps focus and can open from preview click
          const clickedPreview = !!e.target.closest(".preview-wrap");
          setFocusedCard(card);
          if (clickedPreview) {
            window.open(getFileUrl(item.file), "_blank", "noopener,noreferrer");
          }
        }
      });

      grid.appendChild(card);
    });

    async function renderThumbsIfNeeded() {
      if (!useMobileThumbMode() || !window.pdfjsLib) return;
      mobileThumbsReady = false;

      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      const cards = Array.from(document.querySelectorAll(".card"));
      for (let i = 0; i < cards.length; i++) {
        const canvas = cards[i].querySelector(".preview-canvas");
        const status = cards[i].querySelector(".preview-status");
        const loader = cards[i].querySelector(".preview-loader");
        if (canvas.dataset.rendered === "1") {
          loader?.classList.add("hidden");
          continue;
        }
        try {
          const ok = await renderFirstPage(canvas, files[i].file);
          if (!ok) status.style.display = "flex";
          if (ok) canvas.dataset.rendered = "1";
          loader?.classList.add("hidden");
        } catch {
          status.style.display = "flex";
          loader?.classList.add("hidden");
        }
      }
      mobileThumbsReady = true;
    }

    renderThumbsIfNeeded();

    window.addEventListener("resize", () => {
      applyInteractionMode();
      renderThumbsIfNeeded();
    });

    // Reset when clicking outside
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".card")) {
        lockedCard = null;
        setFocusedCard(null);
      }
    });

    // Reset on mouse leave the whole grid (Desktop only)
    grid.addEventListener("mouseleave", () => {
      if (!isTouchMode()) setFocusedCard(null);
    });

    // Mobile: stable auto-focus from scroll without rapid flipping.
    const getCenteredCard = () => {
      const cards = Array.from(document.querySelectorAll(".card"));
      const viewportCenter = window.innerHeight / 2;
      let winner = null;
      let bestScore = Infinity;

      for (const card of cards) {
        const rect = card.getBoundingClientRect();
        if (rect.bottom < 0 || rect.top > window.innerHeight) continue;
        const cardCenter = rect.top + rect.height / 2;
        const score = Math.abs(cardCenter - viewportCenter);
        if (score < bestScore) {
          bestScore = score;
          winner = card;
        }
      }
      return winner;
    };

    const distanceToViewportCenter = (card) => {
      const rect = card.getBoundingClientRect();
      const viewportCenter = window.innerHeight / 2;
      const cardCenter = rect.top + rect.height / 2;
      return Math.abs(cardCenter - viewportCenter);
    };

    let scrollEndTimer = null;
    const updateScrollFocus = () => {
      if (!isTouchMode()) return;
      if (lockedCard) return;
      if (!mobileThumbsReady) return;

      const centered = getCenteredCard();
      if (!centered) return;
      if (!focusedCard) {
        setFocusedCard(centered);
        return;
      }
      if (focusedCard === centered) return;

      // Hysteresis prevents rapid back-and-forth switching between nearby cards.
      const currentDist = distanceToViewportCenter(focusedCard);
      const nextDist = distanceToViewportCenter(centered);
      const SWITCH_THRESHOLD = 36;
      if (nextDist + SWITCH_THRESHOLD < currentDist) {
        setFocusedCard(centered);
      }
    };

    const onScrollLike = () => {
      if (!isTouchMode()) return;
      if (scrollEndTimer) clearTimeout(scrollEndTimer);
      scrollEndTimer = setTimeout(updateScrollFocus, 90);
    };

    if (isTouchMode()) onScrollLike();
    window.addEventListener("scroll", onScrollLike, { passive: true });
    window.addEventListener("touchmove", onScrollLike, { passive: true });
  </script>
</body>
</html>
