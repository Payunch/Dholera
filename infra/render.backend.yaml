services:
  - type: web
    name: dholera-growth-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dholera-growth-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: BASE_URL
        value: https://your-render-service.onrender.com
      - key: FRONTEND_URL
        value: https://your-vercel-domain.vercel.app
      - key: BACKEND_CORS_ORIGINS
        value: https://your-vercel-domain.vercel.app,http://localhost:5173

databases:
  - name: dholera-growth-db
    databaseName: dholera_platform
    user: dholera_admin

