services:
  - type: web
    name: dholera-growth-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ALLOWED_ORIGINS
        value: https://your-vercel-domain.vercel.app,http://localhost:5173
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_LOCKOUT_THRESHOLD
        value: "5"
      - key: ADMIN_LOCKOUT_MS
        value: "1800000"
      - key: WHATSAPP_API_VERSION
        value: v20.0
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
        - key: ADMIN_LOGIN_WINDOW_MS
          value: "900000"
        - key: ADMIN_LOGIN_MAX_ATTEMPTS
          value: "10"
        - key: ADMIN_ACCESS_TOKEN_TTL_SECONDS
          value: "900"
        - key: ADMIN_REFRESH_TOKEN_TTL_SECONDS
          value: "2592000"
        - key: ADMIN_MFA_ISSUER
          value: Dholera Growth Evidence Platform
      - key: WHATSAPP_OTP_TEMPLATE_NAME
        value: otp_verification
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        value: en
        - key: WHATSAPP_LEAD_ALERT_TEMPLATE_NAME
          value: lead_alert
        - key: WHATSAPP_LEAD_ALERT_LANGUAGE
          value: en
        - key: ADMIN_WHATSAPP_NUMBERS
          sync: false
        - key: SMTP_HOST
          sync: false
        - key: SMTP_PORT
          value: "587"
        - key: SMTP_SECURE
          value: "false"
        - key: SMTP_USER
          sync: false
        - key: SMTP_PASS
          sync: false
        - key: SMTP_FROM
          sync: false
        - key: ADMIN_EMAIL_TO
          sync: false

